name: ik
# PRs run on the pull_request event (diff vs base → new-errors is
# meaningful). Pushes to main keep the score history but are
# report-only: with no diff baseline, `new-errors` silently degrades to
# `score:60`, which fails every push while the absolute score is below
# 60 — a gate that is red regardless of the push's content.
on:
  pull_request:
  push:
    branches: [main]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: iszlai/ik-action@v1
        with:
          token: ${{ secrets.IK_TOKEN }}
          fail-on: ${{ github.event_name == 'pull_request' && 'new-errors' || 'never' }}
