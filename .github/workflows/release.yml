# Release — versioning + npm publish via Changesets and OIDC Trusted Publishing.
#
# No long-lived NPM_TOKEN. Publishing authenticates with npm over OIDC
# ("trusted publishing"): the workflow proves its identity to npm and
# receives a short-lived, single-use token at publish time. npm also
# generates provenance attestations automatically.
#
# ─── One-time setup required before this works ───────────────────────
# 1. pnpm >= 10. OIDC publishing is only supported by pnpm 10+. This repo
#    is currently pinned to pnpm@9.15.0 in `packageManager` (root
#    package.json) — bump it to a 10.x release, or publishing falls back
#    to (absent) token auth and fails. `pnpm/action-setup` below reads
#    the version from `packageManager`.
# 2. npmjs.com — for EACH of the 8 publishable @sobree/* packages, add a
#    Trusted Publisher (package → Settings → Trusted Publisher → GitHub
#    Actions) with:
#       organization/user : khayll
#       repository        : sobree
#       workflow filename : release.yml
#    (npm's "bulk trusted publishing config" can do all 8 at once.)
# 3. First publish: a brand-new package may need either pre-registration
#    of its trusted publisher or a one-time manual publish to create it.
#    Verify on npmjs.com before relying on the first OIDC publish.
#
# Requirements baked in: Node >= 22.14, npm CLI >= 11.5.1 (bundled with
# Node 22.14+), `permissions: id-token: write`.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel a release mid-flight.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write # Changesets commits version bumps + tags, opens the Version PR
  pull-requests: write # the auto-maintained "Version Packages" PR
  id-token: write # OIDC — the short-lived npm publish token

jobs:
  release:
    name: version / publish
    # Hard guard: a release only ever runs from `main`, no matter how the
    # workflow was triggered. The `push` trigger above is already
    # main-only, but `workflow_dispatch` can be fired against any branch
    # from the UI/API — this skips the job unless the ref is main, so a
    # release can never run (or publish) from a feature branch.
    if: github.ref == 'refs/heads/main'
    # GitHub-enforced second layer: the `npm` environment has a
    # deployment branch policy of `main` only, so GitHub itself refuses
    # to run this job from any other ref — independent of the `if` guard
    # and the workflow file. (Holds no secrets: publishing is OIDC.)
    # The npmjs.com trusted-publisher config must name this environment
    # (`npm`) to match.
    environment: npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from `packageManager` (must be >= 10 for OIDC).
      - uses: pnpm/action-setup@v4

      # NOTE: deliberately no `registry-url` / token here. setup-node's
      # registry wiring writes `_authToken=${NODE_AUTH_TOKEN}` into .npmrc,
      # which shadows the OIDC flow and breaks trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fast gates before publishing. (The full corpus render-fidelity
      # gate runs in ci.yml on the merge that landed here.)
      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # When changesets are pending → opens/updates the "Version Packages"
      # PR (runs `version-packages`: bump versions + write CHANGELOGs).
      # When none are pending → runs `release` (build packages + publish).
      # Publish auth is OIDC via `id-token: write` above — no NPM_TOKEN.
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
